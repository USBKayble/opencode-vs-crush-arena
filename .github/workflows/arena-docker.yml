name: OpenCode vs Crush - Arena

on:
  workflow_dispatch:
  push:
    branches:
      - '**/arena/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Arena Container
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          outputs: type=digest

  opencode:
    name: OpenCode (opencode.ai)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: build
    env:
      TOOL_TIMEOUT_MS: 300000
      IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run OpenCode arena
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/arena/artifacts:/app/.github/arena/artifacts \
            -e TOOL_TIMEOUT_MS=${{ env.TOOL_TIMEOUT_MS }} \
            -e OPENCODE_CMD=opencode \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.IMAGE_DIGEST }} \
            node task-runners/run-all-tasks.js --tool opencode --cmd opencode --out .github/arena/artifacts/opencode

      - name: Upload OpenCode artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencode-artifacts
          path: .github/arena/artifacts/opencode/**

  crush:
    name: Crush (charmbracelet/crush)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: build
    env:
      TOOL_TIMEOUT_MS: 300000
      IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Crush arena
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/arena/artifacts:/app/.github/arena/artifacts \
            -e TOOL_TIMEOUT_MS=${{ env.TOOL_TIMEOUT_MS }} \
            -e CRUSH_CMD=crush \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.IMAGE_DIGEST }} \
            sh -c "export GOBIN=/root/.local/bin && mkdir -p \$GOBIN && go install github.com/charmbracelet/crush@latest && node task-runners/run-all-tasks.js --tool crush --cmd \$GOBIN/crush --out .github/arena/artifacts/crush"

      - name: Upload Crush artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crush-artifacts
          path: .github/arena/artifacts/crush/**

  summary:
    name: Compare results
    runs-on: ubuntu-latest
    needs: [opencode, crush]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./arena-results

      - name: Produce comparison
        run: |
          echo "OpenCode artifacts:"
          ls -la arena-results/opencode-artifacts || true
          echo "Crush artifacts:"
          ls -la arena-results/crush-artifacts || true
          node ./task-runners/compare.js || true

      - name: Upload comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: arena-comparison
          path: ./arena-results || true
