name: OpenCode vs Crush — Arena

on:
  workflow_dispatch:
  push:
    branches:
      - '**/arena/**'

jobs:
  opencode:
    name: OpenCode (opencode.ai)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci || true

      - name: Run OpenCode arena runner
        env:
          MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
          OPENCODE_CMD: ${{ secrets.OPENCODE_CMD }}
          GITHUB_BOT_PAT: ${{ secrets.GITHUB_BOT_PAT }}
        run: |
          chmod +x .github/arena/run-opencode.sh
          .github/arena/run-opencode.sh

      - name: Upload OpenCode artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencode-artifacts
          path: .github/arena/artifacts/opencode || true

  crush:
    name: Crush (charmbracelet/crush)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci || true

      - name: Run Crush arena runner
        env:
          MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
          CRUSH_CMD: ${{ secrets.CRUSH_CMD }}
          GITHUB_BOT_PAT: ${{ secrets.GITHUB_BOT_PAT }}
        run: |
          chmod +x .github/arena/run-crush.sh
          .github/arena/run-crush.sh

      - name: Upload Crush artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crush-artifacts
          path: .github/arena/artifacts/crush || true

  summary:
    name: Compare results
    runs-on: ubuntu-latest
    needs: [opencode, crush]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./arena-results

      - name: Produce comparison
        run: |
          echo "OpenCode artifacts:"
          ls -la arena-results/opencode-artifacts || true
          echo "Crush artifacts:"
          ls -la arena-results/crush-artifacts || true
          # Basic comparison placeholder
          node ./task-runners/compare.js || true

      - name: Upload comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: arena-comparison
          path: ./arena-results || true
